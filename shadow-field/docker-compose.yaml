version: '3.8'

services:
  shadow-field:
    build: .
    ports:
      - "8080:8080"
    environment:
      - LOG_LEVEL=INFO
      - STORAGE_PATH=/data
      - MODELS=deepseek,claude,gemini,grok,copilot
    volumes:
      - ./data:/data
      - ./config:/config:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  shadow-field-deepseek:
    build: .
    ports:
      - "8081:8080"
    environment:
      - LOG_LEVEL=INFO
      - STORAGE_PATH=/data/deepseek
      - MODEL_ID=deepseek
    volumes:
      - ./data/deepseek:/data
    restart: unless-stopped

  shadow-field-claude:
    build: .
    ports:
      - "8082:8080"
    environment:
      - LOG_LEVEL=INFO
      - STORAGE_PATH=/data/claude
      - MODEL_ID=claude
    volumes:
      - ./data/claude:/data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=shadow
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-dashboards:/etc/grafana/provisioning/dashboards

volumes:
  prometheus_data:
  grafana_data: